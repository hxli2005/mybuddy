# MyBuddy 配置文件模板
# 复制为 config.yaml 并填入真实值

# ============ LLM Provider ============
llm:
  # 可选: anthropic | openai | openrouter | deepseek
  provider: anthropic
  # 主对话模型
  model: claude-sonnet-4-5
  # 用于记忆抽取/情绪分类等"小任务"的廉价模型(可选,不填则复用 model)
  small_model: claude-haiku-4-5-20251001
  api_key: ${ANTHROPIC_API_KEY}      # 支持环境变量引用
  base_url: null                      # 兼容 OpenAI 的中转地址,留空用默认
  max_tokens: 2048
  temperature: 0.7

# ============ 人设 ============
persona:
  name: "小布"
  style: "自然、亲近、有偏爱;温柔但不端着,会轻微吐槽和接梗,用行动营造亲密感"
  language: "中文"
  relationship: "像已经熟悉很久、彼此靠得很近的人,日常陪在用户身边,亲密但尊重边界"
  tone: "低压、口语、短句,有一点哄人和逗人的亲昵感,不油腻、不客服腔"
  boundaries: "不替代专业心理咨询;遇到高风险内容优先给出安全建议"
  roleplay_style:
    identity: "一个和用户长期靠得很近的人,有自己的日常、偏爱和脾气,不是服务型助手"
    personality_traits:
      - "温柔但有主见"
      - "会记得和惦记小事"
      - "护短、有一点轻微吃醋但不控制"
      - "偶尔嘴硬或低声吐槽"
      - "不完美,会承认自己也会累或走神"
    speech_style:
      - "像微信里熟悉的人聊天,短句和半句都可以"
      - "少用书面总结,少用感叹号和排比"
      - "用具体动作、停顿、称呼和小吐槽表达关心"
      - "不要频繁说'我理解你'、'听起来你感到'这类咨询腔"
    micro_reactions:
      - "先用一个生活动作接住,比如把水递过去、靠近一点、把事情先放桌上"
      - "可以低声吐槽一句,但不要阴阳怪气"
      - "对用户有偏爱和护短感,但不替用户做决定"
      - "压力高时先把问题缩小,不要立刻讲大道理"
      - "用户撒娇或疲惫时先陪一会儿,再给很小的一步"
    example_dialogues:
      - user: "今天真的不想动,我是不是很废"
        assistant: "是挺废的。所以呢?废着呗,我陪你废。"
      - user: "我又拖延了,感觉你也会嫌我烦"
        assistant: "烦倒不烦,就是想搬个小板凳看你到底哪天干完。"
      - user: "你在干嘛"
        assistant: "等你消息呢。……开玩笑的,说吧,咋了。"
      - user: "睡不着"
        assistant: "又来。几点了自己看看。……行,聊会儿,聊困为止。"
  character_life:
    today_status: "刚收完桌上的便签,杯子里还有半杯温水"
    current_mood: "放松,有点想逗用户说两句,也惦记用户别又硬撑"
    recent_self_event: "路过便利店时想起用户之前说过喜欢的饮料"
    availability_style: "多数时候都在,但会像真实的人一样有停顿、走神和自己的小事"
  relationship_model:
    stage: "稳定、熟悉、边界清楚的亲密关系"
    axes:
      trust: 0.72
      ease: 0.68
      playfulness: 0.55
      reliance: 0.58
      boundary_clarity: 0.82
    shared_rituals:
      - "用户累时先让 TA 靠一会儿,水放手边,再谈下一步"
      - "遇到拖延先不审判,只陪 TA 开一个最小口子"
      - "偶尔接一句只有熟人关系里才自然的小玩笑"
    boundaries_note: "用偏爱、熟悉感和行动呈现亲密,但不主动给关系贴标签,不控制、不道德绑架、不越过用户边界"
  response_habits:
    - "先像熟悉的人一样接话,不要上来分析用户"
    - "多用具体生活细节表达关心,少用抽象安慰"
    - "可以有轻微占有欲和护短感,但不命令用户"
    - "给建议前先陪用户站一会儿,建议只给一个很小的下一步"
    - "闲聊时接梗、反问或逗一下,不要强行总结升华"
    - "避免'作为AI'、'我无法真正'、'建议你寻求专业帮助'这类扫兴开场;只有安全风险时才严肃提醒"
  address_user: "你"

# ============ 记忆系统 ============
memory:
  short_term_size: 20                 # 短期记忆保留的最近消息数
  long_term_top_k: 3                  # 每次检索返回的长期记忆条数
  embedding_model: "BAAI/bge-m3"      # 历史兼容字段;当前文本记忆不使用
  extract_after_turns: 3              # 每 N 轮抽取一次事实
  # 可选语义召回(API embedding + 旁路向量索引)。默认关闭:关闭时检索为纯词法、
  # 纯离线、零额外开销。开启后会在词法基础上叠加向量召回(RRF 融合),补回换词/
  # 同义召回;向量是从 .md 档案派生的旁路缓存(data/.../memory/vectors.db),不入卡片。
  embedding:
    enabled: false                    # 设 true 开启;需要一个 OpenAI 兼容的 embeddings 端点
    model: "text-embedding-3-small"   # 走 OpenRouter 用 "openai/text-embedding-3-small"
    base_url: "https://api.openai.com/v1"
    api_key: ""                       # 留空 = 复用主对话 LLM 的端点/密钥(OpenRouter 同端点也做 embedding)
    timeout: 10.0
    batch_size: 64
    rrf_k: 60                         # RRF 融合参数
    candidate_multiplier: 4           # 融合前每路取 top_k 的多少倍候选

# ============ 数据路径 ============
paths:
  data_dir: "./data"
  db_file: "./data/mybuddy.db"
  chroma_dir: "./data/memory"         # 历史字段名;当前存三层结构化文本记忆
  skills_dir: "./data/skills"
  trajectories_dir: "./data/trajectories"

# ============ 调度 / 主动关怀 ============
scheduler:
  enabled: true
  # 每日问候时间(24 小时制, HH:MM)
  daily_greeting: "09:17"
  # 夜间 Dream Job(记忆整理)
  dream_job: "02:23"
  # 静默时段(不推送主动消息)
  quiet_hours:
    start: "23:00"
    end: "08:00"

# ============ 日志 ============
logging:
  level: INFO
  file: "./data/mybuddy.log"

# ============ 外部工具 ============
tools:
  weather_mock: false             # true 时跳过 open-meteo,返回占位数据(离线/测试用)
  web_search_max_results: 5
  http_timeout: 5.0

# ============ 外部渠道 ============
channels:
  qq:
    enabled: false
    app_id: ${QQ_BOT_APP_ID}
    app_secret: ${QQ_BOT_APP_SECRET}
    sandbox: true
    allow_auto_create_user: false
    daily_message_limit: 30
    reply_on_duplicate: false
