<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;450;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#faf7f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141210" media="(prefers-color-scheme: dark)" />
    <title>小布 · MyBuddy</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("mybuddy-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
