<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyBuddy Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="系统状态">
        <div class="brand">
          <div>
            <h1>MyBuddy</h1>
            <p id="modelText">loading</p>
          </div>
          <span id="statusDot" class="dot"></span>
        </div>

        <section class="panel">
          <h2>状态</h2>
          <dl class="kv">
            <div><dt>人格</dt><dd id="personaText">-</dd></div>
            <div><dt>工具</dt><dd id="toolCount">-</dd></div>
            <div><dt>调度</dt><dd id="jobCount">-</dd></div>
          </dl>
        </section>

        <section class="panel">
          <h2>情绪</h2>
          <div id="emotionBox" class="emotion neutral">
            <strong>neutral</strong>
            <span>0.0</span>
          </div>
        </section>

        <section class="panel">
          <h2>情绪价值</h2>
          <div id="supportBox" class="support-box">
            <strong>等待输入</strong>
            <p>对话后显示镜映、心理需求和低负担行动。</p>
          </div>
        </section>

        <section class="panel">
          <h2>工具轨迹</h2>
          <ol id="toolTrace" class="trace">
            <li>等待对话</li>
          </ol>
        </section>
      </aside>

      <main class="chat">
        <header class="chat-header">
          <div>
            <h2>对话</h2>
            <p id="turnText">真实后端连接</p>
          </div>
          <div class="feedback">
            <button id="goodBtn" class="icon-btn" type="button" title="标记好回复" disabled>Good</button>
            <button id="badBtn" class="icon-btn" type="button" title="标记坏回复" disabled>Bad</button>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="chatForm" class="composer">
          <input
            id="messageInput"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="输入一句话，测试记忆、提醒或情绪链路"
          />
          <button id="sendBtn" type="submit">发送</button>
        </form>
      </main>

      <aside class="inspector" aria-label="记忆与档案">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="archive" type="button">档案</button>
          <button class="tab" data-tab="profile" type="button">画像</button>
          <button class="tab" data-tab="reminders" type="button">提醒</button>
          <button class="tab" data-tab="persona" type="button">人格</button>
          <button class="tab" data-tab="skills" type="button">Skills</button>
        </div>
        <section id="tabContent" class="tab-content"></section>
      </aside>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
